    "crates/siem",
    "crates/siem-export",
    "crates/automation",
    "crates/ai-engine",
    "crates/compliance",
    "crates/forensic",
    "crates/rest-api",
    "crates/network-stack/firewall",
    "crates/network-stack/dns-proxy",
    "crates/network-stack/tls-inspect",
    "crates/network-stack/vpn-wireguard",
    "crates/network-stack/tor-arti",
