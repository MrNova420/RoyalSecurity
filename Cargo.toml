    "crates/collectors/collector-sysmon",
    "crates/collectors/collector-wfp",
    "crates/collectors/collector-hooks",
    "crates/collectors/collector-usn",
    "crates/collectors/collector-wmi",
    "crates/collectors/collector-usb",
    "crates/collectors/collector-bluetooth",
    "crates/collectors/collector-wifi",
    "crates/collectors/collector-dns",
    "crates/collectors/collector-http",
    "crates/collectors/collector-powershell",
    "crates/collectors/collector-registry",
    "crates/collectors/collector-memory",
    "crates/collectors/collector-audio",
    "crates/collectors/collector-webcam",
    "crates/collectors/collector-firmware",
    "crates/collectors/collector-boot",
    "crates/collectors/collector-email",
    "crates/collectors/collector-log",
    "crates/modules/defense/av",
    "crates/modules/defense/behavior",
    "crates/modules/defense/edr",
    "crates/modules/defense/xdr",
    "crates/modules/defense/asr",
    "crates/modules/defense/exploit",
    "crates/modules/defense/memory",
    "crates/modules/defense/fileless",
    "crates/modules/defense/lolbin",
    "crates/modules/defense/ransomware",
    "crates/modules/defense/injection",
    "crates/modules/defense/hijack",
    "crates/modules/defense/credential",
    "crates/modules/defense/persistence",
    "crates/modules/defense/beacon",
    "crates/modules/defense/dga",
    "crates/modules/defense/ja3",
    "crates/modules/defense/cert",
    "crates/modules/defense/yara-scan",
    "crates/modules/defense/rules",
    "crates/modules/defense/hardening",
    "crates/modules/defense/device",
    "crates/modules/defense/firewall",
    "crates/modules/defense/network",
    "crates/modules/defense/dns",
    "crates/modules/defense/wifi",
    "crates/modules/defense/vpn",
    "crates/modules/defense/tor",
    "crates/modules/defense/leak",
    "crates/modules/defense/encryption",
    "crates/modules/defense/fde",
    "crates/modules/defense/dlp",
    "crates/modules/defense/sdelete",
    "crates/modules/defense/backup",
    "crates/modules/defense/itdr",
    "crates/modules/defense/ueba",
    "crates/modules/defense/ad",
    "crates/modules/defense/deception",
    "crates/modules/defense/tpm",
    "crates/modules/defense/boot",
    "crates/modules/defense/vss",
    "crates/modules/defense/hardware",
    "crates/modules/offense/vuln-scan",
    "crates/modules/offense/config-audit",
    "crates/modules/offense/adversary-sim",
    "crates/modules/offense/exploit-validation",
    "crates/modules/privacy/anti-fingerprint",
    "crates/modules/privacy/tracker-block",
    "crates/modules/privacy/metadata-min",
    "crates/modules/privacy/vpn-tor",
