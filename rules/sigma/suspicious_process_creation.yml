title: Suspicious PowerShell Encoded Command
id: 10000002
status: stable
description: Detects suspicious PowerShell execution with encoded commands commonly used in attacks
author: RoyalSecurity
date: 2025-01-01
logsource:
  process_creation: true
detection:
  Image: powershell.exe
  CommandLine: -enc
condition: all
tags:
  - attack.execution
  - attack.t1059.001

---

